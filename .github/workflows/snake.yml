name: Generate Contribution Snake

on:
  # Run automatically once every day at midnight UTC.
  schedule:
    - cron: "0 0 * * *"

  # Allow manual execution from the GitHub Actions tab.
  workflow_dispatch:

  # Generate the snake after changes are pushed to the main branch.
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate and publish snake animation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Generate contribution snake SVG files
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2373fff3&color_dots=%230b121a,%23125657,%231a8580,%2329c7b9,%2373fff3
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2373fff3

      - name: Publish SVG files to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}