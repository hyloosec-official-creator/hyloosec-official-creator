<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="90" viewBox="0 0 1200 90">
<defs>
  <linearGradient id="g" x1="0%" y1="50%" x2="100%" y2="50%">
    <stop offset="0%" stop-color="#1CC8BA" stop-opacity="0"/>
    <stop offset="20%" stop-color="#1CC8BA" stop-opacity="0.55"/>
    <stop offset="50%" stop-color="#8BFFF4"/>
    <stop offset="80%" stop-color="#1CC8BA" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#1CC8BA" stop-opacity="0"/>
  </linearGradient>

  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- Main divider -->
<line x1="70" y1="45" x2="1130" y2="45"
      stroke="url(#g)"
      stroke-width="3"
      filter="url(#glow)"/>

<!-- Center emblem -->
<g transform="translate(600 45)">
  <circle r="16" fill="#081015" stroke="#26D7C8" stroke-width="2"/>
  <circle r="6" fill="#79FFF3">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;.45;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <path d="M-34 0H-18M18 0H34M0-34V-18M0 18V34"
        stroke="#2AD8C9"
        stroke-width="2"
        stroke-linecap="round"
        opacity=".65"/>
</g>

<!-- Side dots -->
<g fill="#26D7C8">
  <circle cx="120" cy="45" r="2">
    <animate attributeName="opacity" values=".3;1;.3" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="45" r="2">
    <animate attributeName="opacity" values="1;.3;1" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</g>
</svg>