<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#05070B"/>
<stop offset="55%" stop-color="#0B121A"/>
<stop offset="100%" stop-color="#071018"/>
</linearGradient>

<radialGradient id="glow1" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#25D8C8" stop-opacity="0.20"/>
<stop offset="100%" stop-color="#25D8C8" stop-opacity="0"/>
</radialGradient>

<radialGradient id="glow2" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#2D8BFF" stop-opacity="0.12"/>
<stop offset="100%" stop-color="#2D8BFF" stop-opacity="0"/>
</radialGradient>

<pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
<path d="M60 0H0V60" stroke="#FFFFFF" stroke-opacity="0.03"/>
</pattern>

<filter id="blur">
<feGaussianBlur stdDeviation="40"/>
</filter>
</defs>

<rect width="1600" height="900" fill="url(#bg)"/>
<rect width="1600" height="900" fill="url(#grid)"/>

<!-- ambient glows -->
<circle cx="300" cy="160" r="220" fill="url(#glow1)" filter="url(#blur)">
<animate attributeName="cx" values="260;340;260" dur="12s" repeatCount="indefinite"/>
</circle>

<circle cx="1320" cy="740" r="260" fill="url(#glow2)" filter="url(#blur)">
<animate attributeName="cy" values="720;660;720" dur="14s" repeatCount="indefinite"/>
</circle>

<!-- abstract circuits -->
<g stroke="#29D4C5" stroke-opacity=".16" fill="none" stroke-width="2">
<path d="M80 180H420L520 280H760"/>
<path d="M1540 720H1160L1080 640H880"/>
<path d="M180 760H420L520 660H700"/>
<path d="M1460 120H1200L1120 200H900"/>
</g>

<g fill="#63FFF5" opacity=".45">
<circle cx="420" cy="180" r="4"/>
<circle cx="520" cy="280" r="4"/>
<circle cx="1080" cy="640" r="4"/>
<circle cx="1120" cy="200" r="4"/>
</g>

<!-- center focus -->
<circle cx="800" cy="450" r="220" stroke="#2ED5C7" stroke-opacity=".08" fill="none"/>
<circle cx="800" cy="450" r="310" stroke="#2ED5C7" stroke-opacity=".04" fill="none"/>

<!-- animated scan -->
<rect x="-250" y="0" width="220" height="900" fill="#3DF7E7" opacity=".03" transform="skewX(-20)">
<animate attributeName="x" values="-250;1850" dur="10s" repeatCount="indefinite"/>
</rect>

<!-- decorative corners -->
<g stroke="#39D8CA" stroke-opacity=".35" stroke-width="2" fill="none">
<path d="M60 60H180M60 60V180"/>
<path d="M1540 60H1420M1540 60V180"/>
<path d="M60 840H180M60 840V720"/>
<path d="M1540 840H1420M1540 840V720"/>
</g>

<!-- subtle branding -->
<text x="800" y="860" text-anchor="middle"
font-family="Segoe UI,Arial,sans-serif"
font-size="18"
letter-spacing="6"
fill="#6B8088">
HYLOOSEC • PRIVACY • SECURITY • REAL-TIME
</text>

</svg>
