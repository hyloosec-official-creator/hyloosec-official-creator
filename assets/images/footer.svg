<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="220" viewBox="0 0 1400 220">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#05070B"/>
<stop offset="100%" stop-color="#0B121A"/>
</linearGradient>

<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#21CDBF" stop-opacity="0"/>
<stop offset="50%" stop-color="#8DFFF5"/>
<stop offset="100%" stop-color="#21CDBF" stop-opacity="0"/>
</linearGradient>

<filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
<feGaussianBlur stdDeviation="6" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>

<style>
.title{font:700 34px 'Segoe UI',Arial,sans-serif;fill:#EFFFFD}
.sub{font:500 17px 'Segoe UI',Arial,sans-serif;fill:#8FA7B2}
.small{font:600 14px 'Segoe UI',Arial,sans-serif;fill:#B9FFF8;letter-spacing:2px}
</style>
</defs>

<rect width="1400" height="220" rx="28" fill="url(#bg)"/>

<line x1="120" y1="36" x2="1280" y2="36" stroke="url(#line)" stroke-width="2" filter="url(#glow)"/>

<g transform="translate(700 34)">
<circle r="6" fill="#7FFFF4">
<animate attributeName="opacity" values="1;.3;1" dur="2s" repeatCount="indefinite"/>
</circle>
</g>

<text x="700" y="96" text-anchor="middle" class="title">HYLOOSEC</text>

<text x="700" y="128" text-anchor="middle" class="sub">
Secure • Anonymous • Modern Communication Platform
</text>

<text x="700" y="162" text-anchor="middle" class="small">
BECAUSE YOUR CONVERSATIONS BELONG ONLY TO YOU
</text>

<g filter="url(#glow)">
<circle cx="560" cy="190" r="3" fill="#49F6E7"/>
<circle cx="700" cy="190" r="3" fill="#49F6E7"/>
<circle cx="840" cy="190" r="3" fill="#49F6E7"/>
<line x1="563" y1="190" x2="697" y2="190" stroke="#29CDBF" stroke-width="1"/>
<line x1="703" y1="190" x2="837" y2="190" stroke="#29CDBF" stroke-width="1"/>
</g>

<text x="700" y="208" text-anchor="middle"
font-family="Segoe UI,Arial,sans-serif"
font-size="12"
fill="#667784">
© 2026 HylooSec • All Rights Reserved
</text>

</svg>